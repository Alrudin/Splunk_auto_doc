[Generate Data Lineage Topology]
description = Calculates data flow topology and Loss Ratio based on EPS
cron_schedule = */5 * * * *
enableSched = 1
action.summary_index = 1
action.summary_index._name = summary_lineage
search = index=_internal sourcetype=splunkd group=per_sourcetype_thruput series=uf* \
| stats sum(eps) as events_per_sec by host, series \
| rename host as sourceNode, series as sourcetype \
| join sourceNode [ \
    search index=_internal sourcetype=splunkd group=tcpin_connections \
    | eval sourceNode=coalesce(hostname, sourceIp) \
    | eval targetNode=host \
    | stats values(targetNode) as targetNode by sourceNode \
] \
| mvexpand targetNode \
| eval loss_ratio = if(events_per_sec < 0.1, 0.95, 0) \
| table sourceNode, targetNode, events_per_sec, loss_ratio, sourcetype
